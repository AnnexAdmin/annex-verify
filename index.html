<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Verification — Annex Training Institute</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a3a6e 0%, #0d2247 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-area h1 {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .logo-area p {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      margin-top: 4px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #1a3a6e, #2d5fa6);
      padding: 24px 24px 20px;
      text-align: center;
    }
    .card-header .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .card-header .checkmark {
      width: 16px;
      height: 16px;
      background: #4caf50;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #fff;
      flex-shrink: 0;
    }
    .card-header h2 {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
    }
    .card-header p {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      margin-top: 4px;
    }

    .card-body {
      padding: 24px;
    }

    .field {
      display: flex;
      align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }
    .field:last-child { border-bottom: none; }

    .field-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #eef2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .field-label {
      font-size: 11px;
      color: #999;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .field-value {
      font-size: 15px;
      color: #1a1a1a;
      font-weight: 600;
      line-height: 1.3;
    }

    .cert-id-box {
      background: #f8faff;
      border: 1px dashed #c5d3f0;
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 20px;
      text-align: center;
    }
    .cert-id-box .label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .cert-id-box .value {
      font-size: 13px;
      font-family: 'Courier New', monospace;
      color: #1a3a6e;
      font-weight: 700;
      letter-spacing: 1px;
      word-break: break-all;
    }

    .verified-footer {
      background: #f0faf2;
      border-top: 1px solid #e0f2e5;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .verified-footer .dot {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .verified-footer span {
      font-size: 13px;
      color: #2e7d32;
      font-weight: 600;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Error state */
    .error-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .error-card .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-card h2 { color: #c62828; font-size: 18px; margin-bottom: 8px; }
    .error-card p { color: #666; font-size: 14px; line-height: 1.5; }

    .footer-note {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo-area">
    <h1>ANNEX TRAINING INSTITUTE</h1>
    <p>Abu Dhabi, United Arab Emirates</p>
  </div>

  <div id="app"></div>

  <p class="footer-note">Scan the QR code on the certificate to verify authenticity</p>

  <script>
    function getParams() {
      // Data is encoded in the URL hash as base64: #eyJuYW1lIjoiLi4uIn0=
      const hash = window.location.hash.slice(1);
      if (!hash) return null;
      try {
        return JSON.parse(atob(hash));
      } catch(e) {
        return null;
      }
    }

    function render() {
      const app = document.getElementById('app');
      const data = getParams();

      if (!data || !data.name) {
        app.innerHTML = `
          <div class="error-card">
            <div class="error-icon">⚠️</div>
            <h2>Invalid QR Code</h2>
            <p>This QR code does not contain valid certificate data. Please scan the QR code directly from the printed certificate.</p>
          </div>`;
        return;
      }

      app.innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="badge">
              <span class="checkmark">✓</span>
              Verified Certificate
            </div>
            <h2>${escHtml(data.name)}</h2>
            <p>Certificate of Completion</p>
          </div>

          <div class="card-body">
            <div class="field">
              <div class="field-icon">📚</div>
              <div>
                <div class="field-label">Course</div>
                <div class="field-value">${escHtml(data.course)}</div>
              </div>
            </div>
            <div class="field">
              <div class="field-icon">🏆</div>
              <div>
                <div class="field-label">Grade</div>
                <div class="field-value">${escHtml(data.grade)}</div>
              </div>
            </div>
            <div class="field">
              <div class="field-icon">📅</div>
              <div>
                <div class="field-label">Date of Completion</div>
                <div class="field-value">${escHtml(data.date)}</div>
              </div>
            </div>
            <div class="field">
              <div class="field-icon">🔢</div>
              <div>
                <div class="field-label">Serial No</div>
                <div class="field-value">${escHtml(data.sno || 'N/A')}</div>
              </div>
            </div>
            <div class="field">
              <div class="field-icon">📋</div>
              <div>
                <div class="field-label">Registration No</div>
                <div class="field-value">${escHtml(data.regNo || 'N/A')}</div>
              </div>
            </div>

            <div class="cert-id-box">
              <div class="label">Certificate ID</div>
              <div class="value">${escHtml(data.hash)}</div>
            </div>
          </div>

          <div class="verified-footer">
            <div class="dot"></div>
            <span>Authenticity Verified</span>
          </div>
        </div>`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    render();
  </script>
</body>
</html>
